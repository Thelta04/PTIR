services:
  # ── Django + Auto-reload ──────────────────────
  backend:
    volumes:
      - ./backend:/app:z
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - PYTHONUNBUFFERED=1

  # ── Frontend + Vite Auto-reload ──────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      target: dev
    image: ptir-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"
