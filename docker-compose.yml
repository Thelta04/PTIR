services:
  # ── PostgreSQL ────────────────────────────────
  db:
    build: ./database
    container_name: tuxy_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuxy_user -d tuxy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ─────────────────────────
  backend:
    build: ./backend
    container_name: tuxy_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tuxy_db
      - DB_USER=tuxy_user
      - DB_PASSWORD=ptir11
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
    ports:
      - "8000:8000"

  # ── React (Vite build) ───────────────────────
  frontend:
    build: ./frontend
    container_name: tuxy_frontend
    # This container only exists to produce the built static files.
    # Nginx copies them at build time via the multi-stage Dockerfile.
    # We still define it here so docker compose build handles it.
    profiles:
      - build-only

  # ── Nginx reverse proxy ──────────────────────
  nginx:
    build: ./nginx
    container_name: tuxy_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      # Mount the frontend build output into nginx
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
  frontend_dist:
