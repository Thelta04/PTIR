services:
  # ── PostgreSQL ────────────────────────────────
  db:
    build: ./database
    container_name: tuxy_db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ─────────────────────────
  backend:
    build: ./backend
    container_name: tuxy_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"

  # ── Nginx (frontend build + reverse proxy) ───
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tuxy_nginx
    volumes:
      - ./frontend:/app             # Espelha a pasta local para /app no container
      - /app/node_modules           # Protege os node_modules do container (evita conflitos)
    environment:
      - CHOKIDAR_USEPOLLING=true    # Garante que o Vite deteta mudanças em todos os sistemas
    command: npm run dev            # Executa o servidor de desenvolvimento, não o build
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
