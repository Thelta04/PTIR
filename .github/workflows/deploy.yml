name: Deploy TUXY to GCP
on:
  push:
    branches: [ main ]

env:
  GAR_LOCATION: europe-southwest1
  REPOSITORY: tuxy-repo
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Frontend
        run: |
          CLEAN_ID=$(echo "${{ env.PROJECT_ID }}" | tr '[:upper:]' '[:lower:]' | xargs)
          TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${CLEAN_ID}/${{ env.REPOSITORY }}/frontend:latest"
          docker build --target prod -t "$TAG" -f nginx/Dockerfile .
          docker push "$TAG"

      - name: Build and Push Backend
        run: |
          CLEAN_ID=$(echo "${{ env.PROJECT_ID }}" | tr '[:upper:]' '[:lower:]' | xargs)
          TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${CLEAN_ID}/${{ env.REPOSITORY }}/backend:latest"
          docker build -t "$TAG" ./backend
          docker push "$TAG"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_APP_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,haproxy.cfg"
          target: "~/tuxy"

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_APP_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_ID
          script: |
            cd ~/tuxy
            mv docker-compose.prod.yml docker-compose.yml
            # Ensure .env exists (even if empty, to avoid docker-compose error)
            touch .env
            
            # Ensure PROJECT_ID is lowercase
            CLEAN_ID=$(echo "$PROJECT_ID" | tr '[:upper:]' '[:lower:]' | xargs)
            
            export PROJECT_ID=$CLEAN_ID
            docker compose pull
            docker compose up -d
