global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend https-in
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/tuxy.pt.pem
    # Redirecionar HTTP para HTTPS
    http-request redirect scheme https unless { ssl_fc }
    
    # Encaminhar todo o tráfego para os Servidores Aplicacionais
    default_backend app_servers

backend app_servers
    balance roundrobin
    # Verificação de Saúde
    option httpchk GET /api/health/
    # IPs Internos dos Servidores Aplicacionais na porta 8000
    server app-01 10.10.10.20:8000 check
    server app-02 10.10.10.21:8000 check
