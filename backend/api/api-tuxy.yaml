openapi: 3.0.0
info:
  title: Taxi Management API
  description: API para gestão de frota, incluindo restrições de integridade e sistema de avaliações.
  version: 1.2.0
  contact:
    email: suporte@taxiapp.com

servers:
  - url: http://localhost:8000/api/v1
    description: Servidor de Desenvolvimento
  - url: https://api.taxiapp.vercel.app/v1
    description: Servidor de Produção

security:
  - bearerAuth: []

paths:

  # --- AUTENTICAÇÃO ---
  /auth/login:
    post:
      summary: Autenticar utilizador
      tags: [Autenticação]
      description: Permite a clientes ou motoristas entrar no sistema e obter um token JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login bem sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas

  /auth/register/cliente:
    post:
      summary: Registar cliente
      tags: [Autenticação]
      description: Registo público de novos clientes na plataforma.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilizador criado com sucesso

  /auth/register/motorista:
    post:
      summary: Registar novo motorista
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverInput'
      responses:
        '201':
          description: Motorista criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'

  # --- GESTÃO DE UTILIZADORES ---
  /users:
    get:
      summary: Listar todos os utilizadores
      tags: [Utilizadores]
      description: Retorna a lista de todos os utilizadores registados no sistema (clientes, motoristas e gestores). Operação restrita a gestores.
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [cliente, motorista, gestor]
          description: Filtrar utilizadores por tipo de perfil
      responses:
        '200':
          description: Lista de utilizadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          description: Sem permissão para realizar esta operação

  /users/{id}:
    delete:
      summary: Remover um utilizador
      tags: [Utilizadores]
      description: Remove permanentemente um utilizador do sistema. Operação restrita a gestores.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do utilizador
      responses:
        '200':
          description: Utilizador removido com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensagem:
                    type: string
                    example: "Utilizador removido com sucesso."
        '404':
          description: Utilizador não encontrado
        '403':
          description: Sem permissão para realizar esta operação

  /users/{id}/toggle-status:
    patch:
      summary: Ativar ou desativar conta de utilizador
      tags: [Utilizadores]
      description: Alterna o estado ativo/inativo de uma conta de cliente ou motorista. Operação restrita a gestores.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do utilizador
      responses:
        '200':
          description: Estado da conta alterado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_active:
                    type: boolean
                    description: Novo estado da conta após o toggle
                  mensagem:
                    type: string
                    example: "Conta desativada com sucesso."
        '404':
          description: Utilizador não encontrado
        '403':
          description: Sem permissão para realizar esta operação

  # --- GESTÃO DE CLIENTES ---
  /clients:
    get:
      summary: Listar clientes
      tags: [Clientes]
      responses:
        '200':
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'

  /clients/{id}/accept:
    patch:
      summary: Cliente aceita motorista
      tags: [Clientes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do motorista
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: integer
      responses:
        '200':
          description: Viagem aceite

  /clients/{id}/deny:
    patch:
      summary: Cliente recusa motorista
      tags: [Clientes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do motorista
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: integer
      responses:
        '200':
          description: Viagem recusada

  /clients/{id}/trips:
    get:
      summary: Obter histórico de viagens de um cliente
      tags: [Clientes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do cliente
      responses:
        '200':
          description: Histórico de viagens do cliente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'

  /clients/{id}:
    get:
      summary: Obter detalhes de um cliente
      tags: [Clientes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do cliente
      responses:
        '200':
          description: Detalhes do cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
              examples:
                cliente_exemplo:
                  summary: Cliente encontrado
                  value:
                    id: 2
                    name: "Maria Costa"
                    nif: "987654321"
                    gender: "FEMININO"
                    email: "maria@email.com"
                    phone: null
        '404':
          description: Cliente não encontrado
    delete:
      summary: Remover um cliente
      tags: [Clientes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do Cliente
      responses:
        '200':
          description: Cliente Removido

  # --- GESTÃO DE MOTORISTAS ---
  /drivers:
    get:
      summary: Listar motoristas
      tags: [Motoristas]
      parameters:
        - in: query
          name: available
          schema:
            type: boolean
          description: Filtrar por disponibilidade
      responses:
        '200':
          description: Lista de motoristas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'

  /drivers/{id}/rate:
    post:
      summary: Avaliar Motorista
      tags: [Motoristas]
      description: Cliente atribui uma classificação ao motorista referente a uma viagem específica.
      parameters:
        - name: id
          in: path
          description: ID da Viagem
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingInput'
      responses:
        '201':
          description: Avaliação registada com sucesso.
        '400':
          description: Dados inválidos (ex score fora do limite).

  /drivers/{id}:
    get:
      summary: Obter detalhes de um motorista
      tags: [Motoristas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do motorista
      responses:
        '200':
          description: Detalhes do motorista
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
              examples:
                motorista_exemplo:
                  summary: Motorista encontrado
                  value:
                    id: 1
                    name: "Joao Silva"
                    nif: "123456789"
                    license_number: "C1234567"
                    birth_year: 1985
                    gender: "MASCULINO"
                    status: "AVAILABLE"
                    rating: 4.8
        '404':
          description: Motorista não encontrado
    delete:
      summary: Remover um motorista
      tags: [Motoristas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do Motorista
      responses:
        '200':
          description: Motorista Removido

  # --- GESTÃO DE TÁXIS ---
  /taxis:
    get:
      summary: Listar frota de táxis
      tags: [Táxis]
      responses:
        '200':
          description: Lista de táxis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Taxi'
    post:
      summary: Adicionar novo táxi
      tags: [Táxis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxiInput'
      responses:
        '201':
          description: Táxi criado

  /taxi/available:
    get:
      summary: Listar táxis disponíveis num intervalo de tempo
      tags: [Táxis]
      description: Retorna os táxis disponíveis entre dois instantes de tempo.
      parameters:
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de táxis disponíveis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Taxi'

  /taxi/{id}:
    delete:
      summary: Remover um táxi
      tags: [Táxis]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do Taxi
      responses:
        '200':
          description: Táxi Removido

  # --- GESTÃO DE TURNOS ---
  /shifts:
    get:
      summary: Listar Turnos
      tags: [Turnos]
      description: Listar todos os turnos registados.
      responses:
        '200':
          description: Lista de turnos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shift'
    post:
      summary: Agendar um turno
      tags: [Turnos]
      description: Motorista inicia turno (max 8h) e associa-se a um táxi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: integer
                taxi_id:
                  type: integer
                time_start:
                  type: string
                  format: date-time
                time_end:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Turno criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'

  /shifts/{id}/start:
    patch:
      summary: Começar um turno (Clock-in)
      tags: [Turnos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do turno
      responses:
        '200':
          description: Turno iniciado com sucesso

  /shifts/{id}/end:
    patch:
      summary: Terminar um turno (Clock-out)
      tags: [Turnos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do turno
      responses:
        '200':
          description: Turno finalizado com sucesso

  /shifts/{id}:
    delete:
      summary: Remover um turno
      tags: [Turnos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do Turno
      responses:
        '200':
          description: Turno Removido

  # --- GESTÃO DE VIAGENS ---
  /trips:
    get:
      summary: Histórico geral de viagens
      tags: [Viagens]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [REQUESTED, ACCEPTED, IN_PROGRESS, COMPLETED, CANCELED]
      responses:
        '200':
          description: Lista de viagens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
    post:
      summary: Solicitar uma viagem (Cliente)
      tags: [Viagens]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripRequest'
      responses:
        '201':
          description: Viagem solicitada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'

  /trips/{id}/accept:
    patch:
      summary: Motorista aceita a viagem
      tags: [Viagens]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID da viagem
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: integer
      responses:
        '200':
          description: Viagem aceite

  /trips/{id}/cancel:
    patch:
      summary: Cliente cancela o pedido de viagem
      tags: [Viagens]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID da viagem
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: integer
      responses:
        '200':
          description: Pedido cancelado

  /trips/{id}/complete:
    patch:
      summary: Finalizar viagem e processar pagamento
      tags: [Viagens]
      description: Calcula custo final, emite fatura e atualiza estado.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID da viagem
      responses:
        '200':
          description: Viagem completa e fatura gerada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  # --- REABASTECIMENTOS ---
  /refuelings:
    post:
      summary: Registar reabastecimento ou carregamento
      tags: [Reabastecimentos]
      description: Registar combustível ou carga elétrica (validar tipo de motor do táxi).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Refueling'
      responses:
        '201':
          description: Reabastecimento registado

  /refuelings/{id}:
    delete:
      summary: Remover um reabastecimento
      tags: [Reabastecimentos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do reabastecimento
      responses:
        '200':
          description: Reabastecimento Removido

  # --- RELATÓRIOS ---
  /reports/reabastecimento:
    get:
      summary: Relatório de reabastecimentos
      tags: [Relatórios]
      description: Retorna estatísticas de cada reabastecimento, incluindo quantidade de combustível ou kWh e preços.
      parameters:
        - in: query
          name: time_start
          schema:
            type: string
            format: date
          required: true
          description: Data de início (YYYY-MM-DD)
        - in: query
          name: time_end
          schema:
            type: string
            format: date
          required: true
          description: Data de fim (YYYY-MM-DD)
      responses:
        '200':
          description: Relatório de reabastecimentos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date_inicio:
                      type: string
                      format: date
                    date_fim:
                      type: string
                      format: date
                    total_reabastecimentos:
                      type: integer
                    total_litros:
                      type: number
                      minimum: 0
                    total_preco:
                      type: number
                      minimum: 0
                    total_kwh:
                      type: number
                      minimum: 0
              examples:
                semana_reabastecimentos:
                  summary: Exemplo de relatório de reabastecimentos
                  value:
                    - date_inicio: "2025-02-12"
                      date_fim: "2025-03-01"
                      total_reabastecimentos: 12
                      total_litros: 240.5
                      total_preco: 350.0
                      total_kwh: 120
                    - date_inicio: "2025-03-02"
                      date_fim: "2025-03-09"
                      total_reabastecimentos: 10
                      total_litros: 198.2
                      total_preco: 280.0
                      total_kwh: 160

  /reports/taxis:
    get:
      summary: Relatório de táxis
      tags: [Relatórios]
      description: Retorna estatísticas da frota, incluindo número de viagens, km percorridos e utilização.
      parameters:
        - in: query
          name: time_start
          schema:
            type: string
            format: date
          required: true
          description: Data de início (YYYY-MM-DD)
        - in: query
          name: time_end
          schema:
            type: string
            format: date
          required: true
          description: Data de fim (YYYY-MM-DD)
      responses:
        '200':
          description: Relatório semanal de táxis
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    taxi_id:
                      type: integer
                    plate:
                      type: string
                    total_trips:
                      type: integer
                    total_km:
                      type: number
                      minimum: 0
                    active_days:
                      type: integer
                      description: Número de dias em operação
              examples:
                semana_taxis:
                  summary: Exemplo de relatório semanal de táxis
                  value:
                    - taxi_id: 101
                      plate: "12-AB-34"
                      total_trips: 15
                      total_km: 310.2
                      active_days: 6
                    - taxi_id: 102
                      plate: "56-CD-78"
                      total_trips: 10
                      total_km: 215.0
                      active_days: 5

  /reports/clients:
    get:
      summary: Relatório semanal de clientes
      tags: [Relatórios]
      description: Retorna estatísticas de cada cliente, incluindo número de viagens, gasto total e média de passageiros.
      parameters:
        - in: query
          name: time_start
          schema:
            type: string
            format: date
          required: true
          description: Data de início (YYYY-MM-DD)
        - in: query
          name: time_end
          schema:
            type: string
            format: date
          required: true
          description: Data de fim (YYYY-MM-DD)
      responses:
        '200':
          description: Relatório de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    client_id:
                      type: integer
                    name:
                      type: string
                    total_trips:
                      type: integer
                    total_spent:
                      type: number
                      minimum: 0
                    average_passengers:
                      type: number
                      minimum: 1
                      maximum: 4
              examples:
                semana_clientes:
                  summary: Exemplo de relatório semanal de clientes
                  value:
                    - client_id: 201
                      name: "Ana Pereira"
                      total_trips: 5
                      total_spent: 120.0
                      average_passengers: 2
                    - client_id: 202
                      name: "Carlos Sousa"
                      total_trips: 3
                      total_spent: 75.5
                      average_passengers: 1.7

  # --- FATURAS ---
  /invoices:
    get:
      summary: Listar faturas
      tags: [Faturas]
      description: Retorna todas as faturas ou filtra por cliente/viagem.
      parameters:
        - in: query
          name: client_id
          schema:
            type: integer
          description: Filtrar faturas por cliente
        - in: query
          name: trip_id
          schema:
            type: integer
          description: Filtrar faturas por viagem
      responses:
        '200':
          description: Lista de faturas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
              examples:
                faturas_exemplo:
                  summary: Lista de faturas
                  value:
                    - id: 301
                      trip_id: 150
                      amount: 45.0
                      issued_at: "2026-03-08T12:00:00Z"
                    - id: 302
                      trip_id: 151
                      amount: 78.5
                      issued_at: "2026-03-08T13:30:00Z"
    post:
      summary: Emitir fatura
      tags: [Faturas]
      description: Gera uma fatura para uma viagem específica.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trip_id]
              properties:
                trip_id:
                  type: integer
                  description: ID da viagem para a qual se deseja gerar a fatura
      responses:
        '201':
          description: Fatura gerada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
              examples:
                fatura_gerada:
                  summary: Fatura emitida
                  value:
                    id: 303
                    trip_id: 152
                    amount: 60.0
                    issued_at: "2026-03-08T14:00:00Z"

  # --- RESERVAS ---
  /reservations:
    post:
      summary: Reservar um táxi para um turno
      tags: [Reservas]
      description: Permite ao cliente reservar um táxi para uma data/hora específica, indicando pickup e dropoff.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationRequest'
            examples:
              reserva_exemplo:
                summary: Reservar táxi para amanhã
                value:
                  client_id: 1
                  pickup_location: "Rua de Lisboa, 10, Lisboa"
                  dropoff_location: "Avenida da Liberdade, 45, Lisboa"
                  passengers: 2
                  reservation_time: "2026-03-10T15:30:00Z"
      responses:
        '201':
          description: Reserva criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
              examples:
                reserva_criada:
                  summary: Reserva confirmada
                  value:
                    id: 501
                    client_id: 1
                    taxi_id: null
                    pickup_location: "Rua de Lisboa, 10, Lisboa"
                    dropoff_location: "Avenida da Liberdade, 45, Lisboa"
                    passengers: 2
                    reservation_time: "2026-03-10T15:30:00Z"
                    status: PENDING

  /reservations/{id}/cancel:
    patch:
      summary: Cancelar uma reserva
      tags: [Reservas]
      description: Permite ao cliente cancelar uma reserva de táxi antes do horário agendado.
      parameters:
        - name: id
          in: path
          required: true
          description: ID da reserva
          schema:
            type: integer
      responses:
        '200':
          description: Reserva cancelada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
              examples:
                reserva_cancelada:
                  summary: Reserva cancelada
                  value:
                    id: 501
                    client_id: 1
                    taxi_id: null
                    pickup_location: "Rua de Lisboa, 10, Lisboa"
                    dropoff_location: "Avenida da Liberdade, 45, Lisboa"
                    passengers: 2
                    reservation_time: "2026-03-10T15:30:00Z"
                    status: CANCELED
        '404':
          description: Reserva não encontrada
        '400':
          description: Reserva já cancelada ou já convertida em viagem

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # --- AUTENTICAÇÃO ---
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email associado à conta para recuperação de password.

    PasswordResetResponse:
      type: object
      properties:
        message:
          type: string
          example: "Instruções de recuperação enviadas para o email indicado."

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email do utilizador.
        password:
          type: string
          minLength: 6
          description: Password do utilizador.

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT de autenticação.
        token_type:
          type: string
          example: "Bearer"
        user_id:
          type: integer
          description: ID do utilizador autenticado.
        role:
          type: string
          enum: [CLIENT, DRIVER]
          description: Papel do utilizador no sistema.

    RegisterRequest:
      type: object
      required: [name, nif, gender, email, password]
      properties:
        name:
          type: string
        nif:
          type: string
          pattern: '^[0-9]{9}$'
          description: NIF de 9 dígitos.
        gender:
          type: string
          enum: [MASCULINO, FEMININO]
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          description: Mínimo 6 caracteres.
        phone:
          type: string
          description: Número de telefone (opcional).

    TimeIntervalRequest:
      type: object
      required: [inicio, fim]
      properties:
        inicio:
          type: string
          format: date-time
        fim:
          type: string
          format: date-time

    # --- UTILIZADORES ---
    User:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
          format: email
        nif:
          type: string
          pattern: '^[0-9]{9}$'
        genero:
          type: string
          enum: [masculino, femenino, outro, sem resposta]
        role:
          type: string
          enum: [cliente, motorista, gestor]
          description: Tipo de perfil do utilizador
        is_active:
          type: boolean
          description: Estado da conta

    # --- PESSOAS ---
    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nif:
          type: string
          pattern: '^[0-9]{9}$'
          description: NIF de 9 dígitos positivo
        gender:
          type: string
          enum: [MASCULINO, FEMININO]
        email:
          type: string
          format: email
        phone:
          type: string

    Driver:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nif:
          type: string
          pattern: '^[0-9]{9}$'
        license_number:
          type: string
          description: Identifica univocamente um motorista
        birth_year:
          type: integer
          description: Deve ser > 18 anos e < ano atual
        gender:
          type: string
          enum: [MASCULINO, FEMININO]
        status:
          type: string
          enum: [AVAILABLE, BUSY, OFFLINE]
        rating:
          type: number
          format: float
          description: Média das avaliações recebidas

    DriverInput:
      type: object
      required: [name, license_number, email, nif, gender, birth_year, password]
      properties:
        name:
          type: string
        license_number:
          type: string
        nif:
          type: string
          pattern: '^[0-9]{9}$'
        gender:
          type: string
          enum: [MASCULINO, FEMININO]
        birth_year:
          type: integer
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    # --- TÁXI ---
    Taxi:
      type: object
      properties:
        id:
          type: integer
        plate:
          type: string
        model:
          type: string
        purchase_year:
          type: integer
        comfort_level:
          type: string
          enum: [BASICO, LUXUOSO]
        engine_type:
          type: string
          enum: [COMBUSTAO, ELETRICO]
        current_km:
          type: number
          minimum: 0
        is_active:
          type: boolean

    TaxiInput:
      type: object
      required: [plate, model, purchase_year, comfort_level, engine_type]
      properties:
        plate:
          type: string
        model:
          type: string
        purchase_year:
          type: integer
        comfort_level:
          type: string
          enum: [BASICO, LUXUOSO]
        engine_type:
          type: string
          enum: [COMBUSTAO, ELETRICO]
        initial_km:
          type: number
          minimum: 0

    # --- TURNOS ---
    Shift:
      type: object
      properties:
        id:
          type: integer
        driver_id:
          type: integer
        taxi_id:
          type: integer
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        total_income:
          type: number

    # --- VIAGENS ---
    Trip:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        driver_id:
          type: integer
        passengers:
          type: integer
          minimum: 1
          maximum: 4
        pickup_location:
          type: string
        dropoff_location:
          type: string
        status:
          type: string
          enum: [REQUESTED, ACCEPTED, IN_PROGRESS, COMPLETED, CANCELED]
        distance_km:
          type: number
          minimum: 0
          exclusiveMinimum: true
        price_final:
          type: number
          minimum: 0
          exclusiveMinimum: true

    TripRequest:
      type: object
      required: [client_id, pickup_location, dropoff_location, passengers]
      properties:
        client_id:
          type: integer
        pickup_location:
          type: string
        dropoff_location:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 4
          description: Número de passageiros (excluindo motorista) entre 1 e 4.

    RatingInput:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
          description: Classificação de 1 a 5 estrelas.
        comment:
          type: string
          description: Comentário opcional sobre a viagem.

    # --- FATURAS ---
    Invoice:
      type: object
      properties:
        id:
          type: integer
        trip_id:
          type: integer
        amount:
          type: number
          minimum: 0
        issued_at:
          type: string
          format: date-time
          description: Deve ser posterior à data de início da viagem.

    # --- REABASTECIMENTO ---
    Refueling:
      type: object
      required: [taxi_id, amount, cost, driver_id, type]
      properties:
        id:
          type: integer
        taxi_id:
          type: integer
        driver_id:
          type: integer
        type:
          type: string
          enum: [FUEL, ELECTRIC]
        amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Litros (se Combustão) ou kWh (se Elétrico).
        cost:
          type: number
          minimum: 0
          exclusiveMinimum: true
        current_taxi_km:
          type: number
          minimum: 0
          description: Quilometragem no momento do reabastecimento.
        date:
          type: string
          format: date-time

    # --- RESERVAS ---
    ReservationRequest:
      type: object
      required: [client_id, pickup_location, dropoff_location, passengers, reservation_time]
      properties:
        client_id:
          type: integer
          description: ID do cliente que faz a reserva.
        pickup_location:
          type: string
          description: Morada de pickup.
        dropoff_location:
          type: string
          description: Morada de destino.
        passengers:
          type: integer
          minimum: 1
          maximum: 4
          description: Número de passageiros (excluindo motorista).
        reservation_time:
          type: string
          format: date-time
          description: Data e hora desejada para a reserva.

    Reservation:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        taxi_id:
          type: integer
          nullable: true
          description: ID do táxi atribuído (null se ainda não atribuído).
        pickup_location:
          type: string
        dropoff_location:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 4
        reservation_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELED]
          description: Estado atual da reserva.